server:
  servlet:
    context-path: /javaUtils
spring:
  profiles:
    active: dev

  thymeleaf:
    cache: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  aop:
    proxy-target-class: true

mybatis-plus:
  type-aliases-package: com.weng.*.entity
  mapper-locations: classpath:mapper/*/*.xml
  configuration:
    jdbc-type-for-null: null
  global-config:
    banner: false
    db-config:
      select-strategy: not_empty
logging:
  config: classpath:logback-spring.xml

# Actuator监控配置
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,env,beans,conditions
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    defaults:
      enabled: true